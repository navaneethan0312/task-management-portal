name: Task Management CI/CD

on:
  push:
    branches: [master]

env:
  NODE_VERSION: 20

jobs:
  lint:
    name: Lint Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run lint
        working-directory: backend
        run: npm run lint

  test:
    name: Test Stage
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run tests
        working-directory: backend
        run: npm test

  build:
    name: Build Stage
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create package
        run: tar -czf task-app.tar.gz backend frontend

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-app
          path: task-app.tar.gz

  deploy-staging:
    name: Deploy Staging
    needs: build
    runs-on: [self-hosted, Linux, X64, devops-runner]

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: task-app

      - name: Deploy staging
        run: |
          mkdir -p /home/ubuntu/staging
          tar -xzf task-app.tar.gz -C /home/ubuntu/staging

          cd /home/ubuntu/staging/backend
          npm install

          pm2 delete task-staging || true
          PORT=3001 pm2 start app.js --name task-staging
          pm2 save

      - name: Health check staging
        run: |
          sleep 10
          curl http://localhost:3001 || exit 1

  deploy-production:
    name: Deploy Production
    needs: deploy-staging
    runs-on: [self-hosted, Linux, X64, devops-runner]
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: task-app

      - name: Deploy production
        run: |
          mkdir -p /home/ubuntu/production
          tar -xzf task-app.tar.gz -C /home/ubuntu/production

          cd /home/ubuntu/production/backend
          npm install

          pm2 delete task-production || true
          PORT=3000 pm2 start app.js --name task-production
          pm2 save

      - name: Health check production
        run: |
          sleep 10
          curl http://localhost:3000 || exit 1
